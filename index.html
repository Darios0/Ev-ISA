<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page EV-ISA</title>
    <style>
        /* Variables de diseño (estilo moderno) */
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(255, 255, 255, 0.07);
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Contenedor principal */
        .contenedor {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Tipografía */
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        p {
            color: var(--text-muted);
            font-size: 1.125rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Grid de tarjetas (Flexbox para centrar o Grid para organizar) */
        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.04);
            padding: 1.5rem;
            border-radius: 16px;
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.08);
        }

        .card h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        /* Botón de llamada a la acción */
        .btn-cta {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: background 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .btn-cta:hover {
            background: var(--primary-hover);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        /* Diseño responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            .contenedor {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>Page EV-ISA</h1>
        <p>Descripción de la página EV-ISA.</p>
        
        <div class="grid-cards">
            <div class="card">
                <h3>Rápido</h3>
                <p>Carga optimizada y adaptada a cualquier tipo de pantalla.</p>
            </div>
            <div class="card">
                <h3>Intuitivo</h3>
                <p>Navegación fluida diseñada para mejorar la experiencia de usuario.</p>
            </div>
            <div class="card">
                <h3>Estilizado</h3>
                <p>Estética visual vanguardista con efectos de cristal y gradientes.</p>
            </div>
        </div>

        <a href="#" class="btn-cta">Comenzar Ahora</a>
    </div>

</body>
</html>
